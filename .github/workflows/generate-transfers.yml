name: Generate Token Transfers

on:
  # Run every 6 hours starting at 8:15 UTC
  schedule:
    - cron: '15 2,8,14,20 * * *'  # At 2:15, 8:15, 14:15, 20:15 UTC (every 6 hours)
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      tx_count:
        description: 'Number of transactions to generate'
        required: false
        default: '1000'
      amount:
        description: 'Amount per transaction (in tokens)'
        required: false
        default: '0.000001'
      recipient:
        description: 'Recipient address (optional, defaults to sender)'
        required: false
        default: ''

jobs:
  generate-transfers:
    name: Generate Token Transfers
    runs-on: ubuntu-latest
    
    # Only run on main branch
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: apps/contracts
        run: npm ci

      - name: Run generate-transfers script
        working-directory: apps/contracts
        env:
          # Contract address from secrets
          TOKEN_ADDRESS: ${{ secrets.TOKEN_ADDRESS }}
          
          # Private key from secrets (REQUIRED)
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          
          # Optional: Recipient address
          RECIPIENT_ADDRESS: ${{ github.event.inputs.recipient || secrets.RECIPIENT_ADDRESS || '' }}
          
          # Transaction count (from manual input or default)
          TX_COUNT: ${{ github.event.inputs.tx_count || '1000' }}
          
          # Amount per transaction (from manual input or default)
          AMOUNT: ${{ github.event.inputs.amount || '0.000001' }}
          
          # RPC URL
          CELO_RPC_URL: ${{ secrets.CELO_RPC_URL || 'https://forno.celo.org' }}
        run: npx hardhat run scripts/generate-transfers.ts --network celo
        continue-on-error: false

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transfer-logs-${{ github.run_number }}
          path: |
            apps/contracts/*.log
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Transfer generation failed. Check logs for details."
          echo "Run number: ${{ github.run_number }}"
          echo "Timestamp: $(date -u)"

      - name: Summary
        if: success()
        run: |
          echo "✅ Successfully generated transfers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Transactions: ${{ github.event.inputs.tx_count || '1000' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Amount: ${{ github.event.inputs.amount || '0.000001' }} tokens" >> $GITHUB_STEP_SUMMARY
          echo "- Network: Celo Mainnet" >> $GITHUB_STEP_SUMMARY
          echo "- Run: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY

  # Optional: Send notification on completion
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: generate-transfers
    if: always()
    
    steps:
      - name: Notification
        run: |
          if [ "${{ needs.generate-transfers.result }}" == "success" ]; then
            echo "✅ Transfer generation completed successfully"
          else
            echo "❌ Transfer generation failed"
          fi
