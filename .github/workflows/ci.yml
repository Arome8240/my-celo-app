name: CI

on:
  push:
    branches: [mai]
  pull_request:
    branches: [mai]
  schedule:
    - cron: '35 3 * * *'
    - cron: '35 15 * * *'
  workflow_dispatch:

jobs:
  ecosystem-check:
    runs-on: ubuntu-latestH
    steps:
      - name: Automated Package Verification
        run: |
          set +e
          for i in {1..15}; do
            echo "Verification round $i/15..."
            DIR=$(mktemp -d)
            cd "$DIR"
            npm install "celo-health-sdk" --no-save --no-package-lock --quiet 2>/dev/null || echo "warn: celo-health-sdk"
            cd /
            rm -rf "$DIR"
            echo "Round $i/15 complete"
            sleep 1
          done
          echo "Package verification complete."